<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이크 토퍼 생성기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- html2canvas Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>케이크 토퍼 생성기</h1>
        <p>나만의 특별한 케이크 토퍼 문구를 디자인하고 이미지로 받아보세요.</p>

        <div class="controls">
            <!-- Text Input Group - MOVED HERE and will span full width -->
            <div class="control-group text-input-group">
                <label for="text-input">텍스트를 입력하세요</label>
                <textarea id="text-input" placeholder="여기에 텍스트를 입력하세요...
두 줄 이상 입력 가능합니다."></textarea>
            </div>

            <div class="control-group">
                <label for="font-selector">폰트</label>
                <select id="font-selector">
                    <option value="nanum-myeongjo">나눔명조</option>
                    <option value="nanum-gothic">나눔고딕</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="font-weight-slider">굵기</label>
                <div class="slider-wrapper">
                    <input type="range" id="font-weight-slider" min="100" max="900" step="100" value="700">
                    <span id="font-weight-value" class="value-display">700</span>
                </div>
            </div>
    
            <div class="control-group">
                <div class="color-controls">
                    <label for="color-type-selector">색상 타입</label>
                    <select id="color-type-selector">
                        <option value="solid">단색</option>
                        <option value="gold">금색</option>
                        <option value="silver">은색</option>
                        <option value="gradient">그라데이션</option>
                    </select>
                </div>
                
                <div id="solid-color-wrapper" class="color-picker-group">
                     <label for="solid-color-picker">색상</label>
                     <input type="color" id="solid-color-picker" value="#333333" title="단색 선택">
                </div>
        
                <div id="gradient-color-wrapper" class="color-picker-group hidden">
                    <label>그라데이션</label>
                    <div class="gradient-pickers" title="그라데이션 색상 선택">
                        <input type="color" id="gradient-color-start" value="#ff7675">
                        <input type="color" id="gradient-color-end" value="#6c5ce7">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label for="letter-spacing-slider">자간</label>
                <div class="slider-wrapper">
                    <input type="range" id="letter-spacing-slider" min="-5" max="20" step="0.5" value="0">
                    <span id="letter-spacing-value" class="value-display">0px</span>
                </div>
            </div>

            <div class="control-group">
                <label for="line-height-slider">행간</label>
                <div class="slider-wrapper">
                    <input type="range" id="line-height-slider" min="0.8" max="3" step="0.1" value="1.5">
                    <span id="line-height-value" class="value-display">1.5</span>
                </div>
            </div>
        </div> 

        <div id="preview"></div>

        <button id="generate-btn">이미지 생성</button>

        <div id="result-container"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
